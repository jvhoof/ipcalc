name: Run OCI Multi-Account Token Exchange

on: 
    workflow_dispatch: 
    push:
        branches:
            - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      id-token: 'write' # Required to fetch GitHub OIDC tokens

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH # Add OCI CLI to PATH
        shell : bash

      - name: Run OCI Token Exchange Action (Account 1)
        uses: gtrevorrow/oci-token-exchange-action@v1
        with:
          oidc_client_identifier: ${{secrets.OIDC_CLIENT_IDENTIFIER}} # Secret for Account 1's OAuth Client ID:Secret
          domain_base_url: ${{secrets.DOMAIN_BASE_URL}} # Variable for Account 1's Identity Domain URL
          oci_tenancy: ${{secrets.OCI_TENANCY}} # Variable for Account 1's Tenancy OCID
          oci_region: ${{secrets.OCI_REGION}} # Variable for Account 1's OCI Region

      - name: Run OCI CLI Command (Account 1)
        shell: bash # Using --profile to target the specific account configuration
        run: |
          oci --auth security_token --profile ACCOUNT_1_PROFILE os ns get
